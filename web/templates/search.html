<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Reviews Search</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #f8f9fa;
        }
        .container { text-align: center; width: 600px; max-width: 90%; }
        h1 { font-size: 2.5rem; color: #1a1a2e; margin-bottom: 0.5rem; }
        .subtitle { color: #666; margin-bottom: 2rem; }
        .search-box {
            display: flex; gap: 8px;
        }
        input[type="text"] {
            flex: 1; padding: 12px 16px; font-size: 1rem;
            border: 2px solid #ddd; border-radius: 8px; outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #4a69bd; }
        button {
            padding: 12px 24px; font-size: 1rem; font-weight: 600;
            background: #4a69bd; color: white; border: none;
            border-radius: 8px; cursor: pointer; transition: background 0.2s;
        }
        button:hover { background: #3c5aa6; }
        .hint {
            margin-top: 1rem; color: #999; font-size: 0.85rem;
        }
        .hint code { background: #eee; padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Movie Search</h1>
        <p class="subtitle">Boolean search over movie reviews and cinema news</p>
        <form action="/search" method="get" class="search-box">
            <input type="text" name="q" placeholder="Enter search query..." autofocus>
            <button type="submit">Search</button>
        </form>
        <p class="hint">
            Syntax: space or <code>&amp;&amp;</code> = AND,
            <code>||</code> = OR,
            <code>!</code> = NOT,
            parentheses for grouping
        </p>
    </div>
</body>
</html>
